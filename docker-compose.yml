services:
  db:
    image: postgres:16-alpine
    container_name: aevonfit-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: aevonfit
    ports:
      - '5434:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: aevonfit-redis
    restart: unless-stopped
    ports:
      - '6380:6379'
    volumes:
      - redis_data:/data

  api:
    build: .
    container_name: aevonfit-api
    restart: unless-stopped
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/aevonfit
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod}
      JWT_EXPIRES_IN: 7d
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 3000
    ports:
      - '3000:3000'
    profiles:
      - full

volumes:
  postgres_data:
  redis_data:
